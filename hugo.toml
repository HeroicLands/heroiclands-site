baseURL = "https://www.heroiclands.org/"
languageCode = "en-us"
title = "Heroic Lands"

# We're using layouts directly, no external theme

[params]
  description = "Heroic Lands — World of Thalorna and Foundry VTT Game Systems and Modules"
  author = "Tom Rodriguez"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Thalorna"
    url = "/cosmos/world/thalorna/"
    weight = 2
  [[menu.main]]
    name = "Blog"
    url = "/blog/blog/"
    weight = 3
  [[menu.main]]
    name = "Projects"
    url = "/project/"
    weight = 4
    identifier = "projects"
  [[menu.main]]
    name = "Song of Heroic Lands"
    url = "/project/sohl/"
    weight = 1
    parent = "projects"
  [[menu.main]]
    name = "HârnMaster 3"
    url = "/project/harnmaster/"
    weight = 2
    parent = "projects"
  [[menu.main]]
    name = "Modules"
    url = "/project/modules/"
    weight = 3
    parent = "projects"
  [[menu.main]]
    name = "Reference"
    url = "/project/reference/"
    weight = 4
    parent = "projects"
  [[menu.main]]
    name = "License"
    url = "/license/"
    weight = 5

# Section pages (_index.md) render to HTML so hand-crafted landing pages
# like /projects/_index.md work. To prevent auto-generated directory
# listings for sections without a hand-crafted _index.md, set
# `_build.render = "never"` in the section's front matter, or simply
# leave the section without any _index.md and Hugo will 404 it.
[outputs]
  home = ["HTML"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[taxonomies]
  tag = "tags"

# Mount both the generated content tree AND a hand-authored pages/
# directory. The exporter writes to content/; pages/ holds static
# pages (license, about, etc.) that live in the repo itself rather
# than the vault. clean.ts wipes content/ but leaves pages/ alone.
[module]
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "pages"
    target = "content"
  # Hugo requires explicit static mount once module.mounts is used.
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "data"
    target = "data"
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "archetypes"
    target = "archetypes"
