baseURL = "https://heroiclands.org/"
languageCode = "en-us"
title = "Heroic Lands"

# We're using layouts directly, no external theme

[params]
  description = "The Lands of Thalorna — worldbuilding, game systems, and adventure"
  author = "Tom"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Thalorna"
    url = "/world/thalorna/"
    weight = 2
  [[menu.main]]
    name = "Blog"
    url = "/blog/"
    weight = 3
  [[menu.main]]
    name = "Foundry VTT Systems & Modules"
    url = "/project/"
    weight = 4
    identifier = "fvtt"

# Section pages (_index.md) render to HTML so hand-crafted landing pages
# like /projects/_index.md work. To prevent auto-generated directory
# listings for sections without a hand-crafted _index.md, set
# `_build.render = "never"` in the section's front matter, or simply
# leave the section without any _index.md and Hugo will 404 it.
[outputs]
  home = ["HTML"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[taxonomies]
  tag = "tags"
