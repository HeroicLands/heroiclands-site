baseURL = "https://www.heroiclands.org/"
locale = "en-us"
title = "Heroic Lands"

# Chrome, layouts, CSS, info-block partials, and data/sohl.yaml come from the
# shared theme, so www / kb / api read as one coherent site.
theme = "heroiclands-hugo-theme"

[params]
  description = "Heroic Lands — World of Thalorna and Foundry VTT Game Systems and Modules"
  author = "Tom Rodriguez"

# The brand nav ([menu]) is defined in the theme with absolute www URLs and
# inherited here, so every site's header is identical.

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"

# Section pages (_index.md) render to HTML so hand-crafted landing pages
# like /projects/_index.md work.
[outputs]
  home = ["HTML"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[taxonomies]
  tag = "tags"

# Project mounts: the generated content tree + the hand-authored pages/.
# layouts / data / static / archetypes now come from the theme.
[module]
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "pages"
    target = "content"
