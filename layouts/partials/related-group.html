{{- /*
  related-group.html — render one titled group inside the Related
  section. Called from related.html with:
    { "refs": [{title,url,type}, ...], "label": "Places mentioned" }
*/ -}}
<div class="related-group">
  <h3 class="related-group-title">{{ .label }}</h3>
  <ul class="related-list">
    {{- range .refs }}
    <li><a href="{{ .url }}">{{ .title }}</a></li>
    {{- end }}
  </ul>
</div>
