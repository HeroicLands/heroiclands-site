<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if not .IsHome }}{{ .Title }} — {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script>
  // Auto-enhance <span data-copy="URL"> elements with a clipboard copy button
  document.querySelectorAll('[data-copy]').forEach(function(el) {
    var url = el.getAttribute('data-copy');
    el.classList.add('exturl');

    // Wrap existing text in a code element if not already
    if (!el.querySelector('.exturl-text')) {
      var code = document.createElement('code');
      code.className = 'exturl-text';
      code.textContent = el.textContent;
      el.textContent = '';
      el.appendChild(code);
    }

    var btn = document.createElement('button');
    btn.className = 'exturl-copy';
    btn.title = 'Copy URL to clipboard';
    btn.setAttribute('aria-label', 'Copy URL to clipboard');
    btn.innerHTML =
      '<svg class="exturl-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        '<rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>' +
        '<path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>' +
      '</svg>' +
      '<svg class="exturl-check" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">' +
        '<polyline points="20 6 9 17 4 12"/>' +
      '</svg>';
    btn.addEventListener('click', function() {
      navigator.clipboard.writeText(url).then(function() {
        btn.classList.add('copied');
        setTimeout(function() { btn.classList.remove('copied'); }, 1500);
      });
    });
    el.appendChild(btn);
  });
  </script>
</body>
</html>
