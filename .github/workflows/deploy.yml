name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow triggering manually from the Actions tab
  workflow_dispatch:
  # Rebuild when thalorna vault content changes
  repository_dispatch:
    types: [vault-updated]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4

      - name: Checkout thalorna vault
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/thalorna
          path: _vault
          token: ${{ secrets.VAULT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export vault content to Hugo
        run: npx ts-node scripts/export-hugo.ts --verbose
        env:
          VAULT_ROOT: ${{ github.workspace }}/_vault
          HUGO_ROOT: ${{ github.workspace }}

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.147.0"
          extended: true

      - name: Build Hugo site
        run: hugo --minify
        env:
          HUGO_ENVIRONMENT: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
